                                        {['Feeling strong today', 'Low energy', 'Sluggish warm-up', 'Second wind kicked in', 'Peak performance', 'Running on fumes', 'Caffeine boost', 'Felt explosive'].map(chip => (
                                            <button
                                                key={chip}
                                                onClick={() => {
                                                    setSelectedQuickNotes(prev => {
                                                        const current = prev[showQuickNotes] || [];
                                                        const isSelected = current.includes(chip);
                                                        return {
                                                            ...prev,
                                                            [showQuickNotes]: isSelected
                                                                ? current.filter(c => c !== chip)
                                                                : [...current, chip]
                                                        };
                                                    });
                                                }}
                                                style={{
                                                    padding: '6px 12px',
                                                    borderRadius: '16px',
                                                    fontSize: '11px',
                                                    fontWeight: '500',
                                                    cursor: 'pointer',
                                                    border: selectedQuickNotes[showQuickNotes]?.includes(chip) ? 'none' : '1px solid rgba(139,58,98,0.3)',
                                                    background: selectedQuickNotes[showQuickNotes]?.includes(chip) ? '#8b3a62' : 'rgba(139,58,98,0.1)',
                                                    color: selectedQuickNotes[showQuickNotes]?.includes(chip) ? '#fff' : '#c77da0',
                                                    WebkitAppearance: 'none',
                                                }}
                                            >
                                                {chip}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Form & Technique */}
                                <div style={{ marginBottom: '12px' }}>
                                    <div style={{ fontSize: '10px', textTransform: 'uppercase', color: '#999', marginBottom: '6px', fontWeight: '600' }}>Form & Technique</div>
                                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px', marginBottom: '6px' }}>
                                        {['Great mind-muscle connection', 'Form breaking down', 'Grip failing', 'Balance was off', 'Range of motion improved', 'Tempo was good', 'Struggled with lockout', 'Good stretch at bottom'].map(chip => (
                                            <button
                                                key={chip}
                                                onClick={() => {
                                                    setSelectedQuickNotes(prev => {
                                                        const current = prev[showQuickNotes] || [];
                                                        const isSelected = current.includes(chip);
                                                        return {
                                                            ...prev,
                                                            [showQuickNotes]: isSelected
                                                                ? current.filter(c => c !== chip)
                                                                : [...current, chip]
                                                        };
                                                    });
                                                }}
                                                style={{
                                                    padding: '6px 12px',
                                                    borderRadius: '16px',
                                                    fontSize: '11px',
                                                    fontWeight: '500',
                                                    cursor: 'pointer',
                                                    border: selectedQuickNotes[showQuickNotes]?.includes(chip) ? 'none' : '1px solid rgba(139,58,98,0.3)',
                                                    background: selectedQuickNotes[showQuickNotes]?.includes(chip) ? '#8b3a62' : 'rgba(139,58,98,0.1)',
                                                    color: selectedQuickNotes[showQuickNotes]?.includes(chip) ? '#fff' : '#c77da0',
                                                    WebkitAppearance: 'none',
                                                }}
                                            >
                                                {chip}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Recovery & Context */}
                                <div style={{ marginBottom: '12px' }}>
                                    <div style={{ fontSize: '10px', textTransform: 'uppercase', color: '#999', marginBottom: '6px', fontWeight: '600' }}>Recovery & Context</div>
                                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px', marginBottom: '6px' }}>
                                        {['Poor sleep last night', 'Sore from yesterday', 'First day back', 'Post-rest day energy', 'Deload week', 'Coming back from injury', 'Ate well today', 'Skipped meal before'].map(chip => (
                                            <button
                                                key={chip}
                                                onClick={() => {
                                                    setSelectedQuickNotes(prev => {
                                                        const current = prev[showQuickNotes] || [];
                                                        const isSelected = current.includes(chip);
                                                        return {
                                                            ...prev,
                                                            [showQuickNotes]: isSelected
                                                                ? current.filter(c => c !== chip)
                                                                : [...current, chip]
                                                        };
                                                    });
                                                }}
                                                style={{
                                                    padding: '6px 12px',
                                                    borderRadius: '16px',
                                                    fontSize: '11px',
                                                    fontWeight: '500',
                                                    cursor: 'pointer',
                                                    border: selectedQuickNotes[showQuickNotes]?.includes(chip) ? 'none' : '1px solid rgba(139,58,98,0.3)',
                                                    background: selectedQuickNotes[showQuickNotes]?.includes(chip) ? '#8b3a62' : 'rgba(139,58,98,0.1)',
                                                    color: selectedQuickNotes[showQuickNotes]?.includes(chip) ? '#fff' : '#c77da0',
                                                    WebkitAppearance: 'none',
                                                }}
                                            >
                                                {chip}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Mental & Motivation */}
                                <div style={{ marginBottom: '16px' }}>
                                    <div style={{ fontSize: '10px', textTransform: 'uppercase', color: '#999', marginBottom: '6px', fontWeight: '600' }}>Mental & Motivation</div>
                                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px', marginBottom: '6px' }}>
                                        {['Didn\'t want to be here', 'Crushed it', 'Pushed through plateau', 'Lost focus', 'In the zone', 'Nervous about weight', 'Confident today', 'Just going through motions'].map(chip => (
                                            <button
                                                key={chip}
                                                onClick={() => {
                                                    setSelectedQuickNotes(prev => {
                                                        const current = prev[showQuickNotes] || [];
                                                        const isSelected = current.includes(chip);
                                                        return {
                                                            ...prev,
                                                            [showQuickNotes]: isSelected
                                                                ? current.filter(c => c !== chip)
                                                                : [...current, chip]
                                                        };
                                                    });
                                                }}
                                                style={{
                                                    padding: '6px 12px',
                                                    borderRadius: '16px',
                                                    fontSize: '11px',
                                                    fontWeight: '500',
                                                    cursor: 'pointer',
                                                    border: selectedQuickNotes[showQuickNotes]?.includes(chip) ? 'none' : '1px solid rgba(139,58,98,0.3)',
                                                    background: selectedQuickNotes[showQuickNotes]?.includes(chip) ? '#8b3a62' : 'rgba(139,58,98,0.1)',
                                                    color: selectedQuickNotes[showQuickNotes]?.includes(chip) ? '#fff' : '#c77da0',
                                                    WebkitAppearance: 'none',
                                                }}
                                            >
                                                {chip}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <button
                                    onClick={async () => {
                                        const tags = selectedQuickNotes[showQuickNotes] || [];
                                        const existing = await dbOps.sessionNotes.getByExerciseAndDate(showQuickNotes, currentDate);
                                        if (existing) {
                                            existing.tags = tags;
                                            await dbOps.sessionNotes.add(existing);
                                        } else if (tags.length > 0) {
                                            await dbOps.sessionNotes.add({
                                                id: generateId('sn'), exerciseId: showQuickNotes, exerciseName: '',
                                                date: currentDate, mood: null, tags: tags, formCueText: '', freeText: '',
                                            });
                                        }
                                        setShowQuickNotes(null);
                                    }}
                                    style={{ width: '100%', marginTop: '10px', padding: '12px', borderRadius: '8px', background: '#8b3a62', border: 'none', color: '#fff', fontSize: '14px', fontWeight: '600', cursor: 'pointer' }}
                                >
                                    Save
                                </button>
                            </div>
                        </div>
                    )}

                    {modal === 'exercisePicker' && (
                        <ExercisePickerModal
                            onSelect={handleExerciseSelect}
                            categories={categories}
                            onCategoriesChanged={(newCats) => setCategories(newCats)}
                            onCreateNew={() => {
                                setModal('createExercise');
                            }}
                            selectedDate={currentDate}
                            defaultCategory={dayLabel ? dayLabel.toLowerCase() : 'all'}
                        />
                    )}

                    {modal === 'createExercise' && (
                        <CreateExerciseModal
                        categories={categories}
                        dayLabel={dayLabel}
                        onSave={handleCreateExercise}
                        onCancel={() => setModal('exercisePicker')}
                        />
                    )}

                    {modal === 'activityHistory' && selectedExercise && (
                        <HistoryModal
                            exercise={selectedExercise}
                            onLogSet={handleLogSet}
                            onUniformWeight={handleUniformWeight}
                            onUniformReps={handleUniformReps}
                            onBoth={handleBoth}
                            onClose={() => {
                                setModal('exercisePicker');
                                setSelectedExercise(null);
                            }}
                            unit={unit}
                        />
                    )}

                    {modal === 'weightPicker' && selectedExercise && (
                        <WeightPickerModal
                            exercise={selectedExercise}
                            onSelectWeight={handleWeightSelected}
                            selectedDate={currentDate}
                            previousWeight={previousWeight}
                            setNumber={setNumber}
                            unit={unit}
                        />
                    )}

                    {modal === 'repPicker' && selectedExercise && selectedWeight && (
                        <RepPickerModal
                            exercise={selectedExercise}
                            weight={selectedWeight.weight}
                            weightType={selectedWeight.weightType}
                            bandedColor={selectedWeight.bandedColor}
                            onSelectReps={handleRepsSelected}
                            setNumber={setNumber}
                        />
                    )}

                    {modal === 'timedDuration' && selectedExercise && selectedWeight && (
                        <TimedDurationModal
                            exercise={selectedExercise}
                            weight={selectedWeight.weight}
                            weightType={selectedWeight.weightType}
                            bandedColor={selectedWeight.bandedColor}
                            onSelectDuration={handleDurationSelected}
                            setNumber={setNumber}
                        />
                    )}

                    {modal === 'settings' && (
                        <SettingsModal onClose={() => { setModal(null); loadDayData(); }} categories={categories} onCategoriesChanged={(cats) => setCategories(cats)} unit={unit} setUnit={setUnit} />
                    )}

                    {modal === 'sessionNote' && selectedExercise && (
                        <SessionNoteModal
                            exercise={selectedExercise}
                            date={currentDate}
                            onSave={() => {
                                setModal(null);
                                setSelectedExercise(null);
                                loadDayData();
                            }}
                            onCancel={() => {
                                setModal(null);
                                setSelectedExercise(null);
                            }}
                        />
                    )}

                    {modal === 'changeCategory' && selectedExercise && (
                        <ChangeCategoryModal
                            exercise={selectedExercise}
                            categories={categories}
                            dayLabel={dayLabel}
                            onSave={() => {
                                setModal(null);
                                setSelectedExercise(null);
                                loadDayData();
                            }}
                            onCancel={() => {
                                setModal(null);
                                setSelectedExercise(null);
                            }}
                        />
                    )}

                    {modal === 'rename' && selectedExercise && (
                        <RenameModal
                            exercise={selectedExercise}
                            onSave={() => {
                                setModal(null);
                                setSelectedExercise(null);
                                loadDayData();
                            }}
                            onCancel={() => {
                                setModal(null);
                                setSelectedExercise(null);
                            }}
                        />
                    )}

                    {/* CHANGE 5: Custom themed rename confirmation modal */}
                    {renameConfirmData && (
                        <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.5)', zIndex: 300, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px' }}
                             onClick={() => setRenameConfirmData(null)}>
                            <div style={{ background: '#1e0e14', borderRadius: '16px', padding: '20px', maxWidth: '340px', width: '100%' }}
                                 onClick={(e) => e.stopPropagation()}>
                                <div style={{ fontSize: '14px', color: '#e0e0e0', textAlign: 'center', marginBottom: '20px', lineHeight: '1.5' }}>
                                    This will rename the activity for all days, not just today.
                                </div>
                                <div style={{ display: 'flex', gap: '12px' }}>
                                    <button
                                        onClick={() => setRenameConfirmData(null)}
                                        style={{
                                            flex: '1',
                                            padding: '12px 16px',
                                            backgroundColor: 'rgba(139,58,98,0.1)',
                                            border: '1px solid rgba(139,58,98,0.3)',
                                            color: '#c77da0',
                                            borderRadius: '8px',
                                            cursor: 'pointer',
                                            fontSize: '14px',
                                            fontWeight: '600'
                                        }}
                                    >
                                        Cancel
                                    </button>
                                    <button
                                        onClick={async () => {
                                            const ex = renameConfirmData.exercise;
                                            ex.name = renameConfirmData.newName;
                                            await dbOps.exercises.update(ex);

                                            const allSets = await dbOps.sets.getByExerciseId(renameConfirmData.exerciseId);
                                            for (const set of allSets) {
                                                set.exerciseName = renameConfirmData.newName;
                                                await dbOps.sets.update(set);
                                            }

                                            setRenameConfirmData(null);
                                            setModal(null);
                                            setSelectedExercise(null);
                                            await loadDayData();
                                        }}
                                        style={{
                                            flex: '1',
                                            padding: '12px 16px',
                                            backgroundColor: '#8b3a62',
                                            color: 'white',
                                            border: 'none',
                                            borderRadius: '8px',
                                            cursor: 'pointer',
                                            fontSize: '14px',
                                            fontWeight: '600'
                                        }}
                                    >
                                        Confirm
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {modal === 'history' && selectedExercise && (
                        <HistoryModal
                            exercise={selectedExercise}
                            onClose={() => {
                                setModal(null);
                                setSelectedExercise(null);
                            }}
                            unit={unit}
                        />
                    )}

                    {modal === 'dayDetail' && (
                        <DayDetailModal
                            date={currentDate}
                            dayLabel={dayLabel}
                            categories={categories}
                            onClose={() => setModal(null)}
                            onSplitChange={async (newSplit) => {
                                await setDaySplit(currentDate, newSplit);
                                await loadDayData();
                            }}
                            unit={unit}
                        />
                    )}

                    {modal?.startsWith('menu-') && (
                        (() => {
                            const exerciseId = modal.replace('menu-', '');
                            const exercise = exercises.find(e => e.exerciseId === exerciseId);
                            if (exercise) {
                                return (
                                    <div className="modal-overlay" onClick={() => setModal(null)}>
                                        <div className="context-menu" style={{ position: 'fixed', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', background: '#1e0e14', borderRadius: '12px', padding: '8px 0', border: '1px solid rgba(139, 58, 98, 0.2)' }}>
                                            <div
                                                className="context-menu-item"
                                                style={{ padding: '14px 20px', color: '#c77da0', fontSize: '15px', fontWeight: '500', cursor: 'pointer' }}
                                                onClick={() => {
                                                    handleMenuClick(exercise, 'viewHistory');
                                                    setModal(null);
                                                }}
                                            >
                                                View History
                                            </div>
                                            <div
                                                className="context-menu-item"
                                                style={{ padding: '14px 20px', color: '#c77da0', fontSize: '15px', fontWeight: '500', cursor: 'pointer' }}
                                                onClick={() => {
                                                    handleMenuClick(exercise, 'changeCategory');
                                                    setModal(null);
                                                }}
                                            >
                                                Add to Split
                                            </div>
                                            <div
                                                className="context-menu-item"
                                                style={{ padding: '14px 20px', color: '#c77da0', fontSize: '15px', fontWeight: '500', cursor: 'pointer' }}
                                                onClick={() => {
                                                    handleMenuClick(exercise, 'rename');

                                                }}

                                                Rename
                                            </div>

                                                className="context-menu-item danger"
                                                style={{ padding: '14px 20px', color: '#ff6b6b', fontSize: '15px', fontWeight: '500', cursor: 'pointer' }}
                                                onClick={() => {
                                                    handleMenuClick(exercise, 'delete');
                                                    setModal(null);
                                                }}
                                            >
                                                Delete Activity
                                            </div>
                                        </div>
                                    </div>
                                );
                            }
                        })()
                    )}

                    {confirmation && (
                        <ConfirmationDialog
                            title={confirmation.title}
                            message={confirmation.message}
                            onConfirm={confirmation.onConfirm}
                            onCancel={confirmation.onCancel}
                        />
                    )}
                </div>
            );
        }

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { error: null }; }
            static getDerivedStateFromError(error) { return { error }; }
            render() {
                if (this.state.error) {
                    return React.createElement('div', { style: { color: 'red', padding: '20px', fontSize: '14px' } },
                        React.createElement('h2', null, 'App Error'),
                        React.createElement('pre', { style: { whiteSpace: 'pre-wrap' } }, this.state.error.toString()),
                        React.createElement('pre', { style: { whiteSpace: 'pre-wrap', fontSize: '11px', marginTop: '10px' } }, this.state.error.stack)
                    );
                }
                return this.props.children;
            }
        }
        ReactDOM.render(<ErrorBoundary><App /></ErrorBoundary>, document.getElementById('root'));
    </script>
</body>
</html>
