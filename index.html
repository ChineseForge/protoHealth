                                            {importStatus ? 'Importing...' : 'Import Data from CSV'}
                                        </button>
                                        {importStatus && (
                                            <div style={{ marginTop: '12px', padding: '12px', background: 'rgba(139, 58, 98, 0.1)', borderRadius: '8px', textAlign: 'center' }}>
                                                <div style={{ fontSize: '13px', color: '#c77da0', fontWeight: '500' }}>{importStatus}</div>
                                            </div>
                                        )}
                                    </div>
                                    <div style={{ borderTop: '1px solid #333', paddingTop: '16px', textAlign: 'center', marginTop: '24px' }}>
                                        <h3 style={{ color: '#ff6b6b', marginBottom: '8px', fontSize: '14px' }}>Reset All Data</h3>
                                        <p style={{ color: '#666', marginBottom: '12px', lineHeight: '1.5', fontSize: '12px' }}>
                                            Permanently delete all activities, sets, notes, templates, and session notes. This cannot be undone.
                                        </p>
                                        {!resetConfirmStep ? (
                                            <button className="btn btn-danger" onClick={() => setResetConfirmStep(1)} style={{ fontSize: '13px', padding: '10px 16px' }}>
                                                Reset Everything
                                            </button>
                                        ) : resetConfirmStep === 1 ? (
                                            <div>
                                                <p style={{ color: '#ff6b6b', marginBottom: '12px', fontWeight: '600', fontSize: '13px' }}>
                                                    Are you sure? Type DELETE to confirm.
                                                </p>
                                                <input
                                                    type="text"
                                                    className="form-input"
                                                    placeholder="Type DELETE"
                                                    value={resetConfirmText}
                                                    onChange={(e) => setResetConfirmText(e.target.value)}
                                                    style={{ marginBottom: '12px', textAlign: 'center' }}
                                                />
                                                <div className="button-row">
                                                    <button className="btn btn-secondary" onClick={() => { setResetConfirmStep(null); setResetConfirmText(''); }}>Cancel</button>
                                                    <button
                                                        className="btn btn-danger"
                                                        disabled={resetConfirmText !== 'DELETE'}
                                                        style={{ opacity: resetConfirmText === 'DELETE' ? 1 : 0.3 }}
                                                        onClick={handleNuclearReset}
                                                    >
                                                        Confirm Reset
                                                    </button>
                                                </div>
                                            </div>
                                        ) : null}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const ChangeCategoryModal = ({ exercise, onSave, onCancel, categories, dayLabel }) => {

            const handleSelect = async (cat) => {
                exercise.category = cat;
                await dbOps.exercises.update(exercise);
                onSave();
            };

            return (
                <div className="modal-overlay" onClick={onCancel}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <h2>Add to Split</h2>
                            <button className="close-btn" onClick={onCancel}>✕</button>
                        </div>
                        <div className="modal-content">
                            {dayLabel && <div style={{ fontSize: '12px', color: '#8b3a62', marginBottom: '8px', textAlign: 'center' }}>Today's split: {dayLabel}</div>}
                            <p style={{ color: '#999', marginBottom: '16px' }}>Current: {exercise.category}</p>
                            <div className="button-grid">
                                {categories.map(cat => (
                                    <button key={cat} className={`btn ${exercise.category === cat ? 'active' : ''}`} onClick={() => handleSelect(cat)}>
                                        {cat.charAt(0).toUpperCase() + cat.slice(1)}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ConfirmationDialog = ({ title, message, onConfirm, onCancel }) => {
            return (
                <div className="modal-overlay" onClick={onCancel}>
                    <div className="confirmation-dialog" onClick={(e) => e.stopPropagation()}>
                        <div className="confirmation-title">{title}</div>
                        <div className="confirmation-message">{message}</div>
                        <div className="confirmation-buttons">
                            <button className="btn-cancel" onClick={onCancel}>Cancel</button>
                            <button className="btn-confirm" onClick={onConfirm}>Delete</button>
                        </div>
                    </div>
                </div>
            );
        };

        // ============ MAIN APP ============

        
        const getCategories = async () => {
            const record = await dbOps.dayNotes.get('__categories__');
            if (record && record.note) {
                try { return JSON.parse(record.note); } catch(e) {}
            }
            return ['push', 'pull', 'legs', 'core', 'cardio', 'mobility', 'stretch', 'other'];
        };

        const saveCategories = async (cats) => {
            await dbOps.dayNotes.set('__categories__', JSON.stringify(cats));
        };

        const DayDetailModal = ({ date, onClose, dayLabel, categories, onSplitChange, unit }) => {
            const [activeTab, setActiveTab] = useState(dayLabel ? 'activities' : 'split');
            const [activities, setActivities] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [sessionNotes, setSessionNotes] = useState({});
            const [allHistory, setAllHistory] = useState({});
            const [pullDownY, setPullDownY] = useState(0);
            const [templateSplit, setTemplateSplit] = useState('');
            const detailTouchRef = useRef(null);
            const detailContentRef = useRef(null);
            const pullDownRef = useRef(null);
            const modalRef = useRef(null);

            useEffect(() => {
                const d = parseLocalDate(date);
                const dow = d.getDay();
                dbOps.templates.get(dow).then(t => setTemplateSplit(t?.label || ''));
            }, [date]);

            useEffect(() => {
                if (!dayLabel) return;
                const load = async () => {
                    // Load ALL exercises that match the split's category (lowercase match)
                    const allExercises = await dbOps.exercises.getAll();
                    const splitLower = dayLabel.toLowerCase();
                    const matching = allExercises.filter(ex => ex.category === splitLower);
                    matching.sort((a, b) => (b.lastUsed || '').localeCompare(a.lastUsed || ''));
                    setActivities(matching);

                    const histMap = {};
                    const noteMap = {};
                    for (const ex of matching) {
                        const allSets = await dbOps.sets.getByExerciseId(ex.id);
                        const byDate = {};
                        allSets.forEach(s => {
                            if (!byDate[s.date]) byDate[s.date] = [];
                            byDate[s.date].push(s);
                        });
                        histMap[ex.id] = Object.keys(byDate).sort().reverse().map(d => ({
                            date: d, sets: byDate[d].sort((a, b) => a.setOrder - b.setOrder)
                        }));
                        const notes = await dbOps.sessionNotes.getByExerciseId(ex.id);
                        notes.forEach(n => { noteMap[`${n.exerciseId}_${n.date}`] = n; });
                    }
                    setAllHistory(histMap);
                    setSessionNotes(noteMap);
                };
                load();
            }, [dayLabel]);

            const handleDetailTouchStart = (e) => {
                if (activeTab !== 'activities') return;
                detailTouchRef.current = { startX: e.touches[0].clientX, startY: e.touches[0].clientY, startTime: Date.now(), axis: null };
            };
            const handleDetailTouchMove = (e) => {
                if (!detailTouchRef.current || activeTab !== 'activities') return;
                const dx = e.touches[0].clientX - detailTouchRef.current.startX;
                const dy = e.touches[0].clientY - detailTouchRef.current.startY;
                if (detailTouchRef.current.axis === null) {
                    if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
                        if (Math.abs(dx) > Math.abs(dy)) {
                            detailTouchRef.current.axis = 'horizontal';
                            e.preventDefault();
                        } else {
                            detailTouchRef.current.axis = 'vertical';
                        }
                    }
                }
            };
            const handleDetailTouchEnd = (e) => {
                if (!detailTouchRef.current || activeTab !== 'activities') return;
                const dx = e.changedTouches[0].clientX - detailTouchRef.current.startX;
                const dt = Date.now() - detailTouchRef.current.startTime;
                const axis = detailTouchRef.current.axis;
                detailTouchRef.current = null;
                if (axis === 'vertical') return;
                if (Math.abs(dx) > 60 && dt < 400) {
                    const el = detailContentRef.current;
                    const direction = dx > 0 ? 1 : -1;
                    const newIdx = direction > 0 ? Math.max(0, currentIdx - 1) : Math.min(activities.length - 1, currentIdx + 1);
                    if (newIdx !== currentIdx && el) {
                        el.style.transform = `translateX(${direction * 80}px)`;
                        el.style.opacity = '0';
                        setTimeout(() => {
                            el.style.transition = 'none';
                            el.style.transform = `translateX(${-direction * 80}px)`;
                            setCurrentIdx(newIdx);
                            requestAnimationFrame(() => {
                                el.style.transition = 'transform 0.2s ease-out, opacity 0.2s ease-out';
                                el.style.transform = 'translateX(0)';
                                el.style.opacity = '1';
                            });
                        }, 120);
                    }
                }
            };

            const handlePullDownTouchStart = (e) => {
                const contentEl = detailContentRef.current;
                if (contentEl && contentEl.scrollTop === 0) {
                    pullDownRef.current = { startY: e.touches[0].clientY, startTime: Date.now() };
                }
            };

            const handlePullDownTouchMove = (e) => {
                if (!pullDownRef.current) return;
                const dy = e.touches[0].clientY - pullDownRef.current.startY;
                if (dy > 0) {
                    setPullDownY(dy);
                    const contentEl = detailContentRef.current;
                    if (contentEl) {
                        contentEl.style.transform = `translateY(${dy}px)`;
                        contentEl.style.opacity = 1 - (dy / 200);
                    }
                }
            };

            const handlePullDownTouchEnd = (e) => {
                if (!pullDownRef.current) return;
                const dy = pullDownY;
                pullDownRef.current = null;
                const contentEl = detailContentRef.current;
                if (dy > 120) {
                    if (contentEl) {
                        contentEl.style.transform = 'translateY(100vh)';
                        contentEl.style.opacity = '0';
                    }
                    setTimeout(() => {
                        onClose();
                    }, 150);
                } else {
                    if (contentEl) {
                        contentEl.style.transition = 'transform 0.2s ease-out, opacity 0.2s ease-out';
                        contentEl.style.transform = 'translateY(0)';
                        contentEl.style.opacity = '1';
                    }
                    setPullDownY(0);
                }
            };

            const handleSplitSelect = (split) => {
                onSplitChange(split);
                setActiveTab('activities');
            };

            const act = activities[currentIdx];
            const history = act ? (allHistory[act.id] || []) : [];

            const splitOptions = [...new Set([...(categories || [])].map(c => c.charAt(0).toUpperCase() + c.slice(1)))];

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" ref={modalRef} style={{ height: '100vh', maxHeight: '100vh', top: 0, bottom: 0 }} onClick={(e) => e.stopPropagation()} onTouchStart={handleDetailTouchStart} onTouchMove={handleDetailTouchMove} onTouchEnd={handleDetailTouchEnd}>
                        <div style={{ display: 'flex', justifyContent: 'center', paddingTop: '8px', paddingBottom: '4px' }}>
                            <div style={{ width: '40px', height: '4px', borderRadius: '2px', background: '#555' }}></div>
                        </div>
                        <div className="modal-header" onTouchStart={handlePullDownTouchStart} onTouchMove={handlePullDownTouchMove} onTouchEnd={handlePullDownTouchEnd}>
                            <h2>{formatDateShort(date)}</h2>
                            <button className="close-btn" onClick={onClose}>✕</button>
                        </div>
                        <div className="modal-content" style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
                            {dayLabel ? (
                                <>
                                    <div style={{ display: 'flex', gap: '0', marginBottom: '12px', flexShrink: 0 }}>
                                        <button
                                            onClick={() => setActiveTab('activities')}
                                            style={{
                                                flex: 1, padding: '10px 0', border: 'none', fontSize: '13px', fontWeight: '600',
                                                cursor: 'pointer', WebkitAppearance: 'none',
                                                background: activeTab === 'activities' ? '#8b3a62' : 'rgba(255,255,255,0.05)',
                                                color: activeTab === 'activities' ? '#fff' : '#999',
                                                borderRadius: '8px 0 0 8px',
                                            }}
                                        >
                                            {dayLabel} Day Activities
                                        </button>
                                        <button
                                            onClick={() => setActiveTab('split')}
                                            style={{
                                                flex: 1, padding: '10px 0', border: 'none', fontSize: '13px', fontWeight: '600',
                                                cursor: 'pointer', WebkitAppearance: 'none',
                                                background: activeTab === 'split' ? '#8b3a62' : 'rgba(255,255,255,0.05)',
                                                color: activeTab === 'split' ? '#fff' : '#999',
                                                borderRadius: '0 8px 8px 0',
                                            }}
                                        >
                                            Change Split
                                        </button>
                                    </div>

                                    {activeTab === 'activities' && (
                                        <>
                                            {activities.length > 0 && (
                                                <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', padding: '4px 0 8px', gap: '8px', flexShrink: 0 }}>
                                                    <button onClick={() => currentIdx > 0 && setCurrentIdx(currentIdx - 1)} style={{ background: 'none', border: 'none', color: currentIdx > 0 ? '#8b3a62' : '#333', fontSize: '18px', padding: '4px 8px', cursor: 'pointer', WebkitAppearance: 'none' }}>◀</button>
                                                    <div style={{ fontSize: '14px', fontWeight: '700', color: '#e0e0e0', textTransform: 'uppercase', letterSpacing: '0.5px', textAlign: 'center', flex: 1 }}>{act?.name}</div>
                                                    <button onClick={() => currentIdx < activities.length - 1 && setCurrentIdx(currentIdx + 1)} style={{ background: 'none', border: 'none', color: currentIdx < activities.length - 1 ? '#8b3a62' : '#333', fontSize: '18px', padding: '4px 8px', cursor: 'pointer', WebkitAppearance: 'none' }}>▶</button>
                                                </div>
                                            )}
                                            {activities.length > 1 && (
                                                <div style={{ padding: '0 0 8px', display: 'flex', justifyContent: 'center', gap: '6px', flexShrink: 0 }}>
                                                    {activities.map((_, i) => (
                                                        <div key={i} style={{ width: '7px', height: '7px', borderRadius: '50%', background: i === currentIdx ? '#e8c8d8' : 'rgba(232,200,216,0.25)', cursor: 'pointer', transition: 'background 0.2s' }} onClick={() => setCurrentIdx(i)} />
                                                    ))}
                                                </div>
                                            )}
                                            <div ref={detailContentRef} style={{ flex: 1, overflow: 'auto', transition: 'transform 0.2s ease-out, opacity 0.2s ease-out' }}>
                                                {history.length === 0 ? (
                                                    <div style={{ textAlign: 'center', color: '#666', marginTop: 40 }}>No history yet for {act?.name}</div>
                                                ) : (
                                                    history.map((session, idx) => {
                                                        const note = sessionNotes[`${act.id}_${session.date}`];
                                                        return (
                                                            <div key={idx} style={{ paddingBottom: '12px', marginBottom: '12px', borderBottom: idx < history.length - 1 ? '1px solid rgba(255,255,255,0.06)' : 'none' }}>
                                                                <div className="history-date">{formatDateShort(session.date)}</div>
                                                                <div className="set-boxes-container">
                                                                    {session.sets.map((s, sidx) => (
                                                                        <div key={sidx} className="set-box" style={{ backgroundColor: getSetBoxColor(sidx) }}>
                                                                            {formatSetBox(s, session.sets[sidx - 1], unit)}
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                                {note && (
                                                                    <div style={{ marginTop: '8px' }}>
                                                                        {(note.mood || note.tags) && (
                                                                            <div style={{ marginBottom: '6px' }}>
                                                                                {note.mood && (
                                                                                    <div style={{ fontSize: '12px', color: '#c77da0' }}>
                                                                                        {['', 'Rough', 'Below Par', 'Neutral', 'Good', 'Crushed It'][note.mood]}
                                                                                    </div>
                                                                                )}
                                                                                {!note.mood && note.tags && note.tags.length > 0 && (
                                                                                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '4px' }}>
                                                                                        {note.tags.map(tag => (
                                                                                            <span key={tag} style={{ padding: '2px 8px', borderRadius: '12px', background: 'rgba(139, 58, 98, 0.2)', color: '#7b93f5', fontSize: '11px' }}>{tag}</span>
                                                                                        ))}
                                                                                    </div>
                                                                                )}
                                                                            </div>
                                                                        )}
                                                                        {note.formCueText && <div style={{ fontSize: '12px', color: '#999', marginBottom: '4px' }}><strong>Form:</strong> {note.formCueText}</div>}
                                                                        {note.freeText && <div style={{ fontSize: '12px', color: '#999' }}>{note.freeText}</div>}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        );
                                                    })
                                                )}
                                            </div>
                                            {activities.length === 0 && (
                                                <div style={{ textAlign: 'center', color: '#666', marginTop: 40 }}>No {dayLabel.toLowerCase()} activities found yet</div>
                                            )}
                                        </>
                                    )}
                                </>
                            ) : (
                                <div style={{ textAlign: 'center', color: '#666', marginTop: 40, padding: '0 20px' }}>
                                    <div style={{ fontSize: '15px', marginBottom: '20px' }}>Assign a split category to today</div>
                                </div>
                            )}

                            {(activeTab === 'split' || !dayLabel) && (
                                <div style={{ padding: '8px 0' }}>
                                    <div className="button-grid">
                                        {splitOptions.map(opt => (
                                            <button
                                                key={opt}
                                                className={`btn ${dayLabel === opt ? 'active' : ''}`}
                                                onClick={() => handleSplitSelect(opt)}
                                            >
                                                {opt}
                                            </button>
                                        ))}
                                    </div>
                                    {dayLabel && (
                                        <button
                                            className="btn btn-secondary"
                                            onClick={() => { onSplitChange(''); onClose(); }}
                                            style={{ marginTop: '8px' }}
                                        >
                                            Remove Split
                                        </button>
                                    )}
                                    {templateSplit && templateSplit !== dayLabel && (
                                        <button
                                            className="btn btn-secondary"
                                            onClick={() => { onSplitChange(templateSplit); }}
                                            style={{ marginTop: '8px' }}
                                        >
                                            Restore to Weekly Template ({templateSplit})
                                        </button>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [currentDate, setCurrentDate] = useState(getTodayString());
            const [daySets, setDaySets] = useState([]);
            const [dayLabel, setDayLabel] = useState('');
            const [modal, setModal] = useState(null);
            const [selectedExercise, setSelectedExercise] = useState(null);
            const [selectedWeight, setSelectedWeight] = useState(null);
            const [previousWeight, setPreviousWeight] = useState(null);
            const [loggedSetCount, setLoggedSetCount] = useState(0);
            const [confirmation, setConfirmation] = useState(null);
            const [expandedExercise, setExpandedExercise] = useState(null);
            const [selectedSetForEdit, setSelectedSetForEdit] = useState(null);
            const [setNumber, setSetNumber] = useState(1);
            const [prefilledReps, setPrefilledReps] = useState(null);
            const [categories, setCategories] = useState(['push', 'pull', 'legs', 'core', 'cardio', 'mobility', 'stretch', 'other']);
            const [unit, setUnit] = useState('lbs');
            const [bodyweight, setBodyweight] = useState(null);
            const [showBWEditor, setShowBWEditor] = useState(false);
            const [bwEditValue, setBWEditValue] = useState('');
            const [weightBannerDismissed, setWeightBannerDismissed] = useState(false);
            const [inlineMood, setInlineMood] = useState({});
            const [inlineFormCue, setInlineFormCue] = useState({});
            const [inlineNote, setInlineNote] = useState({});
            const [showFormCueInput, setShowFormCueInput] = useState(null);
            const [showNoteInput, setShowNoteInput] = useState(null);
            const [showQuickNotes, setShowQuickNotes] = useState(null);
            const [selectedQuickNotes, setSelectedQuickNotes] = useState({});
            const [exerciseLocks, setExerciseLocks] = useState({});
            const [pendingLockType, setPendingLockType] = useState(null);
            const [pillGlowId, setPillGlowId] = useState(null);
            const [renameConfirmData, setRenameConfirmData] = useState(null);
            const touchRef = useRef(null);
            const contentRef = useRef(null);
            const longPressRef = useRef(null);

            const handleTouchStart = useCallback((e) => {
                if (modal) return; // Don't swipe when a modal is open
                const touch = e.touches[0];
                touchRef.current = { startX: touch.clientX, startY: touch.clientY, startTime: Date.now() };
            }, [modal]);

            const handleTouchEnd = useCallback((e) => {
                if (!touchRef.current || modal) return;
                const touch = e.changedTouches[0];
                const dx = touch.clientX - touchRef.current.startX;
                const dy = touch.clientY - touchRef.current.startY;
                const dt = Date.now() - touchRef.current.startTime;
                touchRef.current = null;
                if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 2 && dt < 400) {
                    const direction = dx > 0 ? 1 : -1; // 1=right(prev), -1=left(next)
                    const el = contentRef.current;
                    if (el) {
                        // Slide out
                        el.style.transform = `translateX(${direction * 100}px)`;
                        el.style.opacity = '0';
                        setTimeout(() => {
                            // Jump to opposite side (invisible)
                            el.style.transition = 'none';
                            el.style.transform = `translateX(${-direction * 100}px)`;
                            // Update date
                            setCurrentDate(prev => addDays(prev, direction > 0 ? -1 : 1));
                            // Force reflow then slide in
                            requestAnimationFrame(() => {
                                el.style.transition = 'transform 0.25s ease-out, opacity 0.25s ease-out';
                                el.style.transform = 'translateX(0)';
                                el.style.opacity = '1';
                            });
                        }, 150);
                    } else {
                        setCurrentDate(prev => addDays(prev, direction > 0 ? -1 : 1));
                    }
                }
            }, [modal]);

            const loadDayData = useCallback(async () => {
                const sets = await dbOps.sets.getByDate(currentDate);
                setDaySets(sets);

                // Check for per-day split first
                const splitRecord = await dbOps.dayNotes.get(`__split_${currentDate}`);
                if (splitRecord && splitRecord.note) {
                    if (splitRecord.note === '__none__') {
                        setDayLabel('');
                    } else {
                        setDayLabel(splitRecord.note);
                    }
                } else {
                    // No per-day split stored — derive from weekly template
                    const d = parseLocalDate(currentDate);
                    const dayOfWeek = d.getDay();
                    const template = await dbOps.templates.get(dayOfWeek);
                    const templateLabel = template?.label || '';
                    setDayLabel(templateLabel);
                    // Bake the template split into per-day storage for today and past days
                    if (templateLabel && currentDate <= getTodayString()) {
                        await dbOps.dayNotes.set(`__split_${currentDate}`, templateLabel);
                    }
                }
            }, [currentDate]);

            const setDaySplit = async (date, split) => {
                const value = split || '__none__';
                await dbOps.dayNotes.set(`__split_${date}`, value);
                if (date === currentDate) {
                    setDayLabel(value === '__none__' ? '' : split);
                }
            };

            useEffect(() => {
                initDB().then(async () => {
                    await bootstrapDefaultExercises();
                    await loadDayData();
                    const cats = await getCategories();
                    setCategories(cats);
                    // Load unit preference
                    const unitRecord = await dbOps.dayNotes.get('__unit__');
                    if (unitRecord && unitRecord.note) {
                        setUnit(unitRecord.note);
                    }
                    // Load bodyweight
                    const bwRecord = await dbOps.dayNotes.get('__bodyweight__');
                    if (bwRecord && bwRecord.note) {
                        setBodyweight(parseFloat(bwRecord.note));
                    }
                });
            }, [currentDate, loadDayData]);

            useEffect(() => {
                if (!expandedExercise) return;
                const loadExNotes = async () => {
                    const note = await dbOps.sessionNotes.getByExerciseAndDate(expandedExercise, currentDate);
                    if (note) {
                        if (note.mood) setInlineMood(prev => ({ ...prev, [expandedExercise]: note.mood }));
                        if (note.formCueText) setInlineFormCue(prev => ({ ...prev, [expandedExercise]: note.formCueText }));
                        if (note.freeText) setInlineNote(prev => ({ ...prev, [expandedExercise]: note.freeText }));
                        if (note.tags && note.tags.length > 0) setSelectedQuickNotes(prev => ({ ...prev, [expandedExercise]: note.tags }));
                    }
                };
                loadExNotes();
            }, [expandedExercise, currentDate]);

            const handleExerciseSelect = async (exercise) => {
                if (!exercise) {
                    setModal(null);
                    return;
                }

                setSelectedExercise(exercise);
                setModal('activityHistory');
            };

            const handleCreateExercise = async (exercise) => {
                setSelectedExercise(exercise);
                setPreviousWeight(null);
                setSetNumber(1);
                setModal('weightPicker');
            };

            const handleLogSet = async () => {
                const daySets = await dbOps.sets.getByDate(currentDate);
                const exerciseSets = daySets.filter(s => s.exerciseId === selectedExercise.id);
                setSetNumber(exerciseSets.length + 1);
                setModal('weightPicker');

                const lastSetForExercise = exerciseSets.sort((a, b) => b.setOrder - a.setOrder)[0];
                setPreviousWeight(lastSetForExercise?.weight || null);
            };

            const handleUniformWeight = async () => {
                setPendingLockType('uniformWeight');
                const daySets = await dbOps.sets.getByDate(currentDate);
                const exerciseSets = daySets.filter(s => s.exerciseId === selectedExercise.id);
                setSetNumber(exerciseSets.length + 1);
                setModal('weightPicker');
                const lastSetForExercise = exerciseSets.sort((a, b) => b.setOrder - a.setOrder)[0];
                setPreviousWeight(lastSetForExercise?.weight || null);
            };

            const handleUniformReps = async () => {
                setPendingLockType('uniformReps');
                const daySets = await dbOps.sets.getByDate(currentDate);
                const exerciseSets = daySets.filter(s => s.exerciseId === selectedExercise.id);
                setSetNumber(exerciseSets.length + 1);
                setModal('weightPicker');
                const lastSetForExercise = exerciseSets.sort((a, b) => b.setOrder - a.setOrder)[0];
                setPreviousWeight(lastSetForExercise?.weight || null);
            };

            const handleBoth = async () => {
                setPendingLockType('both');
                const daySets = await dbOps.sets.getByDate(currentDate);
                const exerciseSets = daySets.filter(s => s.exerciseId === selectedExercise.id);
                setSetNumber(exerciseSets.length + 1);
                setModal('weightPicker');
                const lastSetForExercise = exerciseSets.sort((a, b) => b.setOrder - a.setOrder)[0];
                setPreviousWeight(lastSetForExercise?.weight || null);
            };

            const handleWeightSelected = async (weightData) => {
                if (!weightData) {
                    setModal(null);
                    setSelectedExercise(null);
                    setSelectedWeight(null);
                    setPreviousWeight(null);
                    setPrefilledReps(null);
                    return;
                }

                setSelectedWeight(weightData);

                if (selectedExercise.type === 'timed') {
                    setModal('timedDuration');
                } else if (prefilledReps !== null) {
                    // Auto-save with prefilled reps
                    const daySets = await dbOps.sets.getByDate(currentDate);
                    let exerciseOrder = 1;
                    const existingExercise = daySets.filter(s => s.exerciseId === selectedExercise.id);
                    if (existingExercise.length === 0) {
                        exerciseOrder = Math.max(...daySets.map(s => s.exerciseOrder), 0) + 1;
                    } else {
                        exerciseOrder = existingExercise[0].exerciseOrder;
                    }

                    const setOrder = existingExercise.length + 1;

                    const fullExPrefill = await dbOps.exercises.get(selectedExercise.id);
                    const wmPrefill = fullExPrefill?.weightMeaning || 'total';

                    const set = {
                        id: generateId('set'),
                        date: currentDate,
                        exerciseId: selectedExercise.id,
                        exerciseName: selectedExercise.name,
                        exerciseOrder,
                        setOrder,
                        weight: weightData.weight,
                        weightType: weightData.weightType,
                        reps: prefilledReps,
                        duration: null,
                        weightMeaning: wmPrefill,
                        createdAt: Date.now(),
                    };

                    // CHANGE 6: Record bandedColor if present
                    if (weightData.weightType === 'banded' && weightData.bandedColor) {
                        set.bandedColor = weightData.bandedColor;
                    }

                    await dbOps.sets.add(set);

                    selectedExercise.lastUsed = currentDate;
                    await dbOps.exercises.update(selectedExercise);

                    setLoggedSetCount(loggedSetCount + 1);
                    setModal(null);
                    setSelectedExercise(null);
                    setSelectedWeight(null);
                    setPreviousWeight(null);
                    setPrefilledReps(null);

                    await loadDayData();
                } else {
                    setModal('repPicker');
                }
            };

            const handleRepsSelected = async (reps) => {
                if (reps === null) {
                    setModal(null);
                    setSelectedExercise(null);
                    setSelectedWeight(null);
                    setPreviousWeight(null);
                    return;
                }

                const daySets = await dbOps.sets.getByDate(currentDate);
                let exerciseOrder = 1;
                const existingExercise = daySets.filter(s => s.exerciseId === selectedExercise.id);
                if (existingExercise.length === 0) {
                    exerciseOrder = Math.max(...daySets.map(s => s.exerciseOrder), 0) + 1;
                } else {
                    exerciseOrder = existingExercise[0].exerciseOrder;
                }

                const setOrder = existingExercise.length + 1;

                const fullExercise = await dbOps.exercises.get(selectedExercise.id);
                const weightMeaning = fullExercise?.weightMeaning || 'total';

                const set = {
                    id: generateId('set'),
                    date: currentDate,
                    exerciseId: selectedExercise.id,
                    exerciseName: selectedExercise.name,
                    exerciseOrder,
                    setOrder,
                    weight: selectedWeight.weight,
                    weightType: selectedWeight.weightType,
                    reps,
                    duration: null,
                    weightMeaning,
                    createdAt: Date.now(),
                };

                // CHANGE 6: Record bandedColor if present
                if (selectedWeight.weightType === 'banded' && selectedWeight.bandedColor) {
                    set.bandedColor = selectedWeight.bandedColor;
                }

                await dbOps.sets.add(set);

                selectedExercise.lastUsed = currentDate;
                await dbOps.exercises.update(selectedExercise);

                setLoggedSetCount(loggedSetCount + 1);
                setModal(null);
                setSelectedExercise(null);
                setSelectedWeight(null);
                setPreviousWeight(null);

                await loadDayData();

                if (pendingLockType) {
                    setExerciseLocks(prev => ({ ...prev, [selectedExercise.id]: pendingLockType }));
                    setPendingLockType(null);
                }
            };

            const handleDurationSelected = async (duration) => {
                if (duration === null) {
                    setModal(null);
                    setSelectedExercise(null);
                    setSelectedWeight(null);
                    setPreviousWeight(null);
                    return;
                }

                const daySets = await dbOps.sets.getByDate(currentDate);
                let exerciseOrder = 1;
                const existingExercise = daySets.filter(s => s.exerciseId === selectedExercise.id);
                if (existingExercise.length === 0) {
                    exerciseOrder = Math.max(...daySets.map(s => s.exerciseOrder), 0) + 1;
                } else {
                    exerciseOrder = existingExercise[0].exerciseOrder;
                }

                const setOrder = existingExercise.length + 1;

                const fullExerciseDur = await dbOps.exercises.get(selectedExercise.id);
                const weightMeaningDur = fullExerciseDur?.weightMeaning || 'total';

                const set = {
                    id: generateId('set'),
                    date: currentDate,
                    exerciseId: selectedExercise.id,
                    exerciseName: selectedExercise.name,
                    exerciseOrder,
                    setOrder,
                    weight: selectedWeight.weight || null,
                    weightType: selectedWeight.weightType,
                    reps: null,
                    duration,
                    weightMeaning: weightMeaningDur,
                    createdAt: Date.now(),
                };

                // CHANGE 6: Record bandedColor if present
                if (selectedWeight.weightType === 'banded' && selectedWeight.bandedColor) {
                    set.bandedColor = selectedWeight.bandedColor;
                }

                await dbOps.sets.add(set);

                selectedExercise.lastUsed = currentDate;
                await dbOps.exercises.update(selectedExercise);

                setLoggedSetCount(loggedSetCount + 1);
                setModal(null);
                setSelectedExercise(null);
                setSelectedWeight(null);
                setPreviousWeight(null);

                await loadDayData();

                if (pendingLockType) {
                    setExerciseLocks(prev => ({ ...prev, [selectedExercise.id]: pendingLockType }));
                    setPendingLockType(null);
                }
            };

            const handleDeleteSet = async (setId) => {
                await dbOps.sets.delete(setId);
                await loadDayData();
            };

            const handleEditSet = async (set) => {
                setSelectedSetForEdit(set);
                setSelectedExercise(await dbOps.exercises.get(set.exerciseId));
                setSelectedWeight({
                    weight: set.weight,
                    weightType: set.weightType,
                    bandedColor: set.bandedColor,
                });

                if (set.reps) {
                    setModal('repPicker');
                } else {
                    setModal('timedDuration');
                }
            };

            const handleDeleteExercise = (exercise) => {
                setConfirmation({
                    title: `Delete ${exercise.exerciseName}?`,
                    message: `Remove ${exercise.exerciseName} and all its sets from today?`,

                    onConfirm: async () => {
                        const daySets = await dbOps.sets.getByDate(currentDate);
                        const toDelete = daySets.filter(s => s.exerciseId === exercise.exerciseId);
                        for (const set of toDelete) {
                            await dbOps.sets.delete(set.id);
                        }
                        setConfirmation(null);
                        await loadDayData();
                    },
                    onCancel: () => setConfirmation(null),
                });
            };

            const handleMenuClick = (exercise, action) => {
                if (action === 'delete') {
                    handleDeleteExercise(exercise);
                } else if (action === 'sessionNote') {
                    setSelectedExercise(exercise.sets[0] ? { id: exercise.exerciseId, name: exercise.exerciseName, type: 'reps' } : null);
                    dbOps.exercises.get(exercise.exerciseId).then(ex => {
                        setSelectedExercise(ex);
                        setModal('sessionNote');
                    });
                } else if (action === 'viewHistory') {
                    setSelectedExercise(exercise.sets[0] ? { id: exercise.exerciseId, name: exercise.exerciseName, type: 'reps' } : null);
                    dbOps.exercises.get(exercise.exerciseId).then(ex => {
                        setSelectedExercise(ex);
                        setModal('history');
                    });
                } else if (action === 'rename') {
                    setSelectedExercise(exercise.sets[0] ? { id: exercise.exerciseId, name: exercise.exerciseName, type: 'reps' } : null);
                    dbOps.exercises.get(exercise.exerciseId).then(ex => {
                        setSelectedExercise(ex);
                        setModal('rename');
                    });
                } else if (action === 'changeCategory') {
                    setSelectedExercise(exercise.sets[0] ? { id: exercise.exerciseId, name: exercise.exerciseName, type: 'reps' } : null);
                    dbOps.exercises.get(exercise.exerciseId).then(ex => {
                        setSelectedExercise(ex);
                        setModal('changeCategory');
                    });
                }
            };

            const groupedExercises = {};
            daySets.forEach(set => {
                if (!groupedExercises[set.exerciseId]) {
                    groupedExercises[set.exerciseId] = {
                        exerciseId: set.exerciseId,
                        exerciseName: set.exerciseName,
                        sets: [],
                    };
                }
                groupedExercises[set.exerciseId].sets.push(set);
            });

            const exercises = Object.values(groupedExercises).sort((a, b) => {
                const aOrder = a.sets[0]?.exerciseOrder || 0;
                const bOrder = b.sets[0]?.exerciseOrder || 0;
                return aOrder - bOrder;
            });

            const RenameModal = ({ exercise, onSave, onCancel }) => {
                const [newName, setNewName] = useState(exercise.name);

                const handleSave = async () => {
                    if (!newName.trim()) return;

                    // CHANGE 5: Instead of window.confirm, set renameConfirmData to show custom modal
                    setRenameConfirmData({
                        exerciseId: exercise.id,
                        newName: newName.trim(),
                        exercise: exercise
                    });
                };

                return (
                    <div className="modal-overlay" onClick={onCancel}>
                        <div className="modal" onClick={(e) => e.stopPropagation()}>
                            <div className="modal-header">
                                <h2>Rename Activity</h2>
                                <button className="close-btn" onClick={onCancel}>✕</button>
                            </div>
                            <div className="modal-content">
                                <div className="form-group">
                                    <label className="form-label">Activity Name</label>
                                    <input
                                        type="text"
                                        className="form-input"
                                        value={newName}
                                        onChange={(e) => setNewName(e.target.value)}
                                        autoFocus
                                    />
                                </div>
                            </div>
                            <div className="modal-footer">
                                <button className="btn btn-secondary" onClick={onCancel}>Cancel</button>
                                <button className="btn" onClick={handleSave}>Save</button>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="app-container">
                    <div className="top-nav">
                        <div className="nav-title">Fitness Tracker</div>
                        <button className="settings-btn" onClick={() => { setExpandedExercise(null); setModal('settings'); }}>

                                <button
                                    onClick={async () => {
                                        const val = inlineNote[showNoteInput] || '';

                                            existing.freeText = val;
                                            await dbOps.sessionNotes.add(existing);
                                        } else if (val) {
                                            await dbOps.sessionNotes.add({
                                                id: generateId('sn'), exerciseId: showNoteInput, exerciseName: '',

                                        }
                                        setShowNoteInput(null);

                                    Save

                                 onClick={(e) => e.stopPropagation()}>

                                    Quick notes for this activity
                                </div>

                                {/* Physical Sensations */}

                                            <button
                                                key={chip}

                                                    setSelectedQuickNotes(prev => {
                                                        const current = prev[showQuickNotes] || [];
                                                        const isSelected = current.includes(chip);
                                                        return {
                                                            ...prev,
                                                            [showQuickNotes]: isSelected
                                                                ? current.filter(c => c !== chip)
                                                                : [...current, chip]

                                                    });
                                                }}
                                                style={{
                                                    padding: '6px 12px',
                                                    borderRadius: '16px',
                                                    fontSize: '11px',
                                                    fontWeight: '500',
                                                    cursor: 'pointer',
                                                    border: selectedQuickNotes[showQuickNotes]?.includes(chip) ? 'none' : '1px solid rgba(139,58,98,0.3)',
                                                    background: selectedQuickNotes[showQuickNotes]?.includes(chip) ? '#8b3a62' : 'rgba(139,58,98,0.1)',
                                                    color: selectedQuickNotes[showQuickNotes]?.includes(chip) ? '#fff' : '#c77da0',
                                                    WebkitAppearance: 'none',
                                                }}
                                            >
                                                {chip}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                    <div style={{ fontSize: '10px', textTransform: 'uppercase', color: '#999', marginBottom: '6px', fontWeight: '600' }}>Energy & Performance</div>
